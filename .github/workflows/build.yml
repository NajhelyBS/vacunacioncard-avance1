name: SonarQube Cloud Analysis

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build, Test and Analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw clean verify sonar:sonar \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.organization=najhelybs \
            -Dsonar.projectKey=NajhelyBS_vacunacioncard \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -Dsonar.coverage.exclusions="**/exception/**,**/model/**,**/service/vacunacion/**,**/service/cita/**,**/service/campania/**,**/service/salud/**,**/service/comun/**,**/service/usuario/impl/SeguroMedicoServiceImpl.java,**/service/usuario/impl/UsuarioServiceImpl.java,**/service/usuario/impl/EnfermeroServiceImpl.java,**/service/usuario/impl/AdministradorServiceImpl.java,**/service/auth/impl/CuentaUsuarioServiceImpl.java,**/service/auth/impl/PermisoServiceImpl.java,**/service/auth/impl/RolServiceImpl.java,**/VacunacioncardApplication.java"

            
